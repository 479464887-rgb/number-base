<!DOCTYPE html>
<html lang="en">

<head>
<meta property="og:title" content="Number Base — DevKit">
<meta property="og:description" content="Free online Number Base tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/number-base/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/number-base/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Number Base — DevKit Tools</title>
  <meta name="description" content="在线进制Convert器 - 二进制/八进制/十进制/十六进制互转">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff
    }

    .logo span {
      color: #f0c040
    }

    header .badge {
      font-size: 10px;
      background: #daa520;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1
    }

    .tool-wrapper {
      padding: 20px 0
    }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 12px;
      color: #484f58
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
      margin: 0 8px
    }

    .btn-primary:hover {
      background: #2ea043 !important
    }

    .btn:hover {
      background: #30363d !important
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #58a6ff !important
    }

    .btn {
      font-family: inherit
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
    <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
  </header>
  <main>
    <h1 style="font-size:24px;margin-bottom:4px">Number Base Converter</h1>
    <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线进制Convert器 - 二进制/八进制/十进制/十六进制互转</p>
    <div class="tool-wrapper">
      <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center"><input type="text" id="nb-input" placeholder="Input数字..." style="flex:1;padding:14px;font-size:16px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#f0c040;outline:none;font-family:mono" oninput="convert()"></div>
      <div id="nb-results" style="display:grid;gap:8px"></div>
    </div>
  </main>
  <footer><a href="https://github.com/479464887-rgb/number-base">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer>
  <script>
    function convert() {
      const v = document.getElementById('nb-input').value.trim();
      const r = document.getElementById('nb-results');
      if (!v) {
        r.innerHTML = '';
        return
      }
      let n;
      if (v.startsWith('0b') || v.startsWith('0B')) n = parseInt(v.substring(2), 2);
      else if (v.startsWith('0o') || v.startsWith('0O')) n = parseInt(v.substring(2), 8);
      else if (v.startsWith('0x') || v.startsWith('0X')) n = parseInt(v.substring(2), 16);
      else n = parseInt(v, 10);
      if (isNaN(n)) {
        r.innerHTML = '<span style=color:#f85149>无效数字</span>';
        return
      }
      const bases = [{
        label: '二进制 (Binary)',
        v: '0b' + n.toString(2),
        c: '#3fb950'
      }, {
        label: '八进制 (Octal)',
        v: '0o' + n.toString(8),
        c: '#58a6ff'
      }, {
        label: '十进制 (Decimal)',
        v: n.toString(10),
        c: '#f0c040'
      }, {
        label: '十六进制 (Hex)',
        v: '0x' + n.toString(16).toUpperCase(),
        c: '#bc8cff'
      }];
      r.innerHTML = bases.map(b => `<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:#8b949e">${b.label}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-family:mono;font-size:16px;color:${b.c};font-weight:600">${b.v}</span><button onclick="navigator.clipboard.writeText('${b.v}')" style="background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px">Copy</button></div></div>`).join('')
    }
    convert()
  </script>
</body>

</html>
